<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0.23 0 0 0 0  0.42 0 0 0 0  0.96 0 0 0 0  0 0 0 0.5 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="192" height="192" rx="40" fill="#0a0b10"/>

  <!-- Circle border with glow -->
  <circle cx="96" cy="96" r="72" fill="none" stroke="#3b6cf6" stroke-width="2" filter="url(#glow)"/>

  <!-- Dagger blade -->
  <path
    d="M96 38 L108 112 L102 120 L96 128 L90 120 L84 112 Z"
    fill="#e8eaf0"
  />

  <!-- Crossguard -->
  <path
    d="M78 112 L114 112 L111 119 L81 119 Z"
    fill="#e8eaf0"
  />

  <!-- Grip -->
  <rect x="92" y="120" width="8" height="19" rx="2" fill="#e8eaf0"/>

  <!-- Pommel -->
  <circle cx="96" cy="145" r="5" fill="#e8eaf0"/>
</svg>

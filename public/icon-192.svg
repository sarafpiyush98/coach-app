<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0.1 0 0 0 0  0.27 0 0 0 0  0.84 0 0 0 0  0 0 0 0.6 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="hexFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A1543"/>
      <stop offset="100%" stop-color="#060D2E"/>
    </linearGradient>
  </defs>

  <rect width="192" height="192" rx="40" fill="#0C0C0F"/>

  <g filter="url(#glow)">
    <polygon
      points="96,30 150,61 150,123 96,154 42,123 42,61"
      fill="url(#hexFill)"
      stroke="#1B45D7"
      stroke-width="2"
    />
  </g>

  <defs>
    <clipPath id="hexClip">
      <polygon points="96,30 150,61 150,123 96,154 42,123 42,61"/>
    </clipPath>
    <pattern id="scanlines" patternUnits="userSpaceOnUse" width="192" height="4">
      <rect width="192" height="2" fill="transparent"/>
      <rect y="2" width="192" height="2" fill="rgba(27,69,215,0.06)"/>
    </pattern>
  </defs>
  <rect width="192" height="192" fill="url(#scanlines)" clip-path="url(#hexClip)"/>

  <text
    x="96" y="104"
    font-family="Arial, Helvetica, sans-serif"
    font-size="75"
    font-weight="700"
    fill="#1B45D7"
    text-anchor="middle"
    dominant-baseline="middle"
  >S</text>
</svg>

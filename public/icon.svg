<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0.1 0 0 0 0  0.27 0 0 0 0  0.84 0 0 0 0  0 0 0 0.6 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="hexFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A1543"/>
      <stop offset="100%" stop-color="#060D2E"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="#0C0C0F"/>

  <!-- Hexagon with glow -->
  <g filter="url(#glow)">
    <polygon
      points="256,80 400,163 400,329 256,412 112,329 112,163"
      fill="url(#hexFill)"
      stroke="#1B45D7"
      stroke-width="4"
    />
  </g>

  <!-- Scanline overlay on hexagon -->
  <defs>
    <clipPath id="hexClip">
      <polygon points="256,80 400,163 400,329 256,412 112,329 112,163"/>
    </clipPath>
    <pattern id="scanlines" patternUnits="userSpaceOnUse" width="512" height="4">
      <rect width="512" height="2" fill="transparent"/>
      <rect y="2" width="512" height="2" fill="rgba(27,69,215,0.06)"/>
    </pattern>
  </defs>
  <rect width="512" height="512" fill="url(#scanlines)" clip-path="url(#hexClip)"/>

  <!-- "S" letter -->
  <text
    x="256" y="280"
    font-family="Arial, Helvetica, sans-serif"
    font-size="200"
    font-weight="700"
    fill="#1B45D7"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="-5"
  >S</text>
</svg>

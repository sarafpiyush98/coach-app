<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0.23 0 0 0 0  0.42 0 0 0 0  0.96 0 0 0 0  0 0 0 0.5 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="#0a0b10"/>

  <!-- Circle border with glow -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="#3b6cf6" stroke-width="3" filter="url(#glow)"/>

  <!-- Dagger blade — angular geometric upward-pointing -->
  <path
    d="M256 100 L288 300 L272 320 L256 340 L240 320 L224 300 Z"
    fill="#e8eaf0"
  />

  <!-- Crossguard -->
  <path
    d="M208 300 L304 300 L296 316 L216 316 Z"
    fill="#e8eaf0"
  />

  <!-- Grip -->
  <rect x="246" y="320" width="20" height="50" rx="3" fill="#e8eaf0"/>

  <!-- Pommel -->
  <circle cx="256" cy="384" r="12" fill="#e8eaf0"/>
</svg>
